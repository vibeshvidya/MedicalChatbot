<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediBot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main-container">

    <div class="chat-card">

        <div class="chat-header">
            <div class="bot-icon">🩺</div>
            <div>
                <h2>MediBot</h2>
                <p>AI Medical Chat Assistant</p>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                <div class="avatar">🤖</div>
                <div class="text">
                    Hello! I am MediBot. Ask me your medical-related questions.
                </div>
            </div>
        </div>

        <div class="typing" id="typing">
            MediBot is typing...
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your question here..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>
function sendMessage() {
    const inputField = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");
    const typing = document.getElementById("typing");

    const userMessage = inputField.value.trim();

    if (userMessage === "") {
        return;
    }

    chatBox.innerHTML += `
        <div class="message user-message">
            <div class="text">${userMessage}</div>
            <div class="avatar">👤</div>
        </div>
    `;

    inputField.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    typing.style.display = "block";

    fetch("/get", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "msg=" + encodeURIComponent(userMessage)
    })
    .then(response => response.text())
    .then(data => {
        typing.style.display = "none";

        chatBox.innerHTML += `
            <div class="message bot-message">
                <div class="avatar">🤖</div>
                <div class="text">${data}</div>
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(error => {
        typing.style.display = "none";

        chatBox.innerHTML += `
            <div class="message bot-message">
                <div class="avatar">⚠️</div>
                <div class="text">Sorry, something went wrong. Please try again.</div>
            </div>
        `;
    });
}

document.getElementById("userInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
